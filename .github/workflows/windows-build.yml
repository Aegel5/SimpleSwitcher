name: Windows Pre-release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # 1:00 UTC каждый день

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Без этой строки скачается вся история     

      - name: Check activity and exit if stale
        shell: bash
        run: |
          LAST_COMMIT=$(git log -1 --format=%ct)
          LIMIT=$(($(date +%s) - 25 * 3600))
          
          if [ "$LAST_COMMIT" -lt "$LIMIT" ]; then
            echo "::error::Нет свежих коммитов за 25 часов. Прерываю работу."
            exit 1 # Весь Workflow остановится здесь и станет красным
          fi      

      # 1. Читаем версию из файла ver.h
      - name: Get version from ver.h
        id: get_version
        shell: pwsh
        run: |
          $versionFile = Get-Content "src/ver.h" -Raw
          if ($versionFile -match 'SW_VERSION\s*=\s*"([^"]+)"') {
              $ver = $Matches[1]
              echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
              Write-Host "Найдена версия: $ver"
          } else {
              Write-Error "Ошибка: Не удалось найти версию в файле ver.h"
              exit 1
          }

      # 2. Сборка (CMake)
      - name: Configure and Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release

      # 3. Хеширование EXE и упаковка в ZIP
      - name: Prepare Artifacts and ZIP
        shell: pwsh
        run: |
          # Считаем SHA256 для каждого найденного .exe
          cd build/Release
          Get-ChildItem "*.exe" | ForEach-Object {
              $h = (Get-FileHash $_.Name -Algorithm SHA256).Hash
              "$h *$($_.Name)" | Out-File "$($_.Name).sha256" -Encoding ascii
          }
          cd ../..
          
          # Собираем: exe, их хеши и всё из папки bin_files
          $files = Get-ChildItem "build/Release/*.exe", "build/Release/*.sha256", "bin_files/*"
          
          # Создаем архив с именем версии
          $zipName = "latest-build.zip"
          Compress-Archive -Path $files.FullName -DestinationPath $zipName -Force
          
      # 1. Удаляем старый релиз и тег в GitHub через встроенную утилиту gh
      - name: Cleanup old preview
        run: |
          gh release delete preview --yes --cleanup-tag || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}      

      # Публикуем
      - name: Create Fresh Pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: preview
          name: "Latest Preview Build"
          prerelease: true
          files: latest-build.zip       
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}